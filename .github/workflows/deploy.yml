name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Backend checks
      - name: Install backend dependencies
        run: bun install
        working-directory: gerpain_backend

      - name: Backend typecheck
        run: bunx tsc --noEmit
        working-directory: gerpain_backend

      # Frontend checks
      - name: Install frontend dependencies
        run: bun install
        working-directory: nextjs_frontend

      - name: Frontend typecheck
        run: bun run typecheck
        working-directory: nextjs_frontend

      - name: Frontend build
        run: bun run build
        working-directory: nextjs_frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://gerpain.com

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Hetzner
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'ENDSSH'
            export PATH="$HOME/.bun/bin:$HOME/.local/share/fnm:$PATH"
            eval "$(fnm env)"
            
            cd ~/projects/gerpain-2.0
            git pull origin main
            
            cd gerpain_backend
            bun install --frozen-lockfile
            cd ..
            
            cd nextjs_frontend
            bun install --frozen-lockfile
            bun run build
            cd ..
            
            pm2 reload ecosystem.config.cjs
          ENDSSH
